<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Charles Chiu</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍💻</text></svg>">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script>
        (function () {
            var t = localStorage.getItem("theme") ||
                ((window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark");
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
</head>
<body>
    <main id="main" class="hero">
        <div class="hero__inner">
            <h1 class="hero__name">404</h1>
            <p class="hero__role">Page not found</p>
            <p class="hero__tagline">The page you're looking for doesn't exist or has moved.</p>
            <div class="hero__actions">
                <a class="btn btn--primary" href="/">Back home</a>
            </div>
        </div>
    </main>
</body>
</html>
